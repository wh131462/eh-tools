<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 文档/纸张外框 -->
  <rect x="4" y="3" width="16" height="18" rx="2" stroke="#667eea" stroke-width="2"/>
  <!-- 上方: 阿拉伯数字 "1" -->
  <text x="12" y="10.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#667eea" font-family="Arial">123</text>
  <!-- 分隔线 -->
  <line x1="7" y1="13" x2="17" y2="13" stroke="#667eea" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 下方: 大写中文 "壹" 的简化表达 -->
  <text x="12" y="18.5" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#667eea" font-family="serif">壹贰叁</text>
</svg>
